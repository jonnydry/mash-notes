name: Release static build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match package version $expected" >&2
            exit 1
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Verify release
        run: npm run ci

      - name: Package static site
        run: |
          cp LICENSE build/LICENSE.txt
          cd build
          zip -r ../mash-static-${{ github.ref_name }}.zip . -x '*.DS_Store'
          cd ..
          sha256sum mash-static-${{ github.ref_name }}.zip > SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "mash-static-${{ github.ref_name }}.zip" SHA256SUMS --generate-notes --verify-tag
